services:
  postgres:
    image: postgres:16-alpine
    container_name: kaaydiang-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-elearn}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kaaydiang-network

  redis:
    image: redis:7-alpine
    container_name: kaaydiang-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kaaydiang-network

  # Optional: Adminer for database GUI management
  adminer:
    image: adminer:latest
    container_name: kaaydiang-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kaaydiang-network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  kaaydiang-network:
    driver: bridge
